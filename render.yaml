services:
  - type: web
    name: tasklane-api
    env: node
    buildCommand: pnpm install --frozen-lockfile && pnpm --filter @tasklane/shared build && pnpm --filter @tasklane/api build
    startCommand: pnpm run start:api
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: tasklane-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: tasklane-redis
          property: connectionString
      - key: PORT
        value: 3000

databases:
  - name: tasklane-db
    databaseName: tasklane
    user: tasklane

redis:
  - name: tasklane-redis
