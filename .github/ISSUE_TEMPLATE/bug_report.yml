name: Bug Report
description: Report a bug or technical issue affecting the application.
title: '[BUG]: '
labels: ['bug', 'triage']
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report an issue. We take code quality seriously and will review this as soon as possible.
  - type: input
    id: version
    attributes:
      label: Node / Package Manager Version
      description: Provide the versions of Node.js and pnpm you are using.
      placeholder: 'Node v20.x, pnpm v9.x'
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the Bug
      description: A clear and concise description of what the bug is.
      placeholder: When I click on [X], [Y] happens instead of [Z]...
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Exact steps to reproduce the behavior.
      placeholder: |
        1. Go to '...'
        2. Click on '....'
        3. Scroll down to '....'
        4. See error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Server / Console Logs
      description: Paste any relevant terminal logs, server traces, or browser console errors here.
      render: shell
